 <!DOCTYPE html>  <html lang="pt-BR">    <head>    
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">    
<title>Para Você 💜</title>  <style>    
body{    
    margin:0;    
    font-family:Arial, sans-serif;    
    background:linear-gradient(135deg,#5b21b6,#8b5cf6,#c084fc);    
    color:white;    
    display:flex;    
    justify-content:center;    
    align-items:center;    
    height:100vh;    
    text-align:center;    
    overflow:hidden;    
}    .card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:90%;
max-width:450px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
font-size:34px;
margin-bottom:15px;
}

p{
font-size:18px;
line-height:1.6;
}

button{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:30px;
background:white;
color:#6d28d9;
font-size:17px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

#msg{
margin-top:20px;
font-size:20px;
display:none;
}

.heart{
position:absolute;
color:#f3c4ff;
animation:subir 6s linear infinite;
font-size:20px;
}

@keyframes subir{
from{
transform:translateY(100vh);
opacity:1;
}
to{
transform:translateY(-100px);
opacity:0;
}
}
</style>  </head>

<body>  <div class="card">    
<h1>💜 Para Você 💜</h1>  <p> Queria ser capaz de dizer o quanto você mudou meus dias desde que você chegou .    
</p>  <button onclick="mostrar()">Clique Aqui</button>  <div id="msg">    
💜 Você é exatamente como nas orações que fiz 💜    
</div>  </div>  <script>    
function mostrar(){    
document.getElementById("msg").style.display="block";    
}    function coracao(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💜";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},6000);
}

setInterval(coracao,300);
</script>  </body>

</html>
